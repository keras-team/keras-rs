name: Nightly

on:
  workflow_dispatch: # To Generate wheels on demand outside of schedule.
  schedule:
    - cron: '0 3 * * *' # run at 3 AM UTC / 8 PM PDT

permissions:
  contents: read

jobs:
  check_commits:
    runs-on: ubuntu-latest
    name: Check latest commit
    outputs:
      has_recent_commits: ${{ steps.check.outputs.has_recent_commits }}
    steps:
      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@v6
      - id: check
        run: |
          # Check for commits in the last 25 hours (use a 1 hour margin)
          if [ -z "$(git rev-list --after="25 hours" ${{ github.sha }})" ]; then
            echo "has_recent_commits=false" >> $GITHUB_OUTPUT
          else
            echo "has_recent_commits=true" >> $GITHUB_OUTPUT
          fi

  run-test-for-nightly:
    needs: [check_commits]
    if: ${{needs.check_commits.outputs.has_recent_commits == 'true'}}
    uses: ./.github/workflows/actions.yml

  nightly:
    name: Build Wheel file and upload
    needs: [check_commits, run-test-for-nightly]
    if: ${{needs.check_commits.outputs.has_recent_commits == 'true'}}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Get pip cache dir
        id: pip-cache
        run: |
          python -m pip install --upgrade pip setuptools
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT
      - name: pip cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install twine
          pip install -r requirements.txt --progress-bar off
      - name: Build wheel file
        run: |
          python pip_build.py --nightly
      - name: Publish KerasRS Nightly to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_NIGHTLY_API_TOKEN }}
          verbose: true
